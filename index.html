<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Factor0x</title>
  <meta name="description" content="Factor0x — A platform where verified invoices find liquidity. Capital for business. Yield for investors.">
  <meta name="keywords" content="invoice financing, factoring, liquidity, yield, DeFi, business capital">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Factor0x">
  <meta property="og:description" content="A platform where verified invoices find liquidity. Capital for business. Yield for investors.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://factor0x.com/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Factor0x">
  <meta name="twitter:description" content="A platform where verified invoices find liquidity. Capital for business. Yield for investors.">
  <link rel="alternate" hreflang="en" href="/en/">
  <link rel="alternate" hreflang="ru" href="/ru/">
  <link rel="alternate" hreflang="x-default" href="/en/">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }
    #loader { opacity: 0; transition: opacity 0.3s ease; }
    #loader.ready { opacity: 1; }
  </style>
</head>
<body>
  <!-- language links for crawlers -->
  <a href="/en/" style="display:none">English</a>
  <a href="/ru/" style="display:none">Русский</a>

  <img id="loader" src="resources/icons/animated/loading.svg" alt="">

  <script>
    (function () {
      var lang = (navigator.language || navigator.userLanguage || '').toLowerCase().slice(0, 2);
      var supported = { en: '/en/', ru: '/ru/' };
      var dest = supported[lang] || '/en/';

      var img = document.getElementById('loader');
      img.onload = function () {
        img.classList.add('ready');
        setTimeout(function () { window.location.replace(dest); }, 400);
      };
      img.onerror = function () { window.location.replace(dest); };
    })();
  </script>
</body>
</html>
